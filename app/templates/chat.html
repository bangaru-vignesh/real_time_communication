<!DOCTYPE html>
<html>
<head>
    <title>RealChat MVP</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        .setup { margin-bottom: 20px; }
        .chat-container { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .message { padding: 5px; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .sender { font-weight: bold; color: blue; }
        .me { color: green; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>RealChat MVP</h2>
    <div class="setup" id="setup">
        <input type="text" id="myId" placeholder="My User ID (e.g., user1)" />
        <input type="text" id="receiverId" placeholder="Chat with (e.g., user2)" />
        <button onclick="connect()">Connect</button>
    </div>

    <div id="chatInterface" style="display:none;">
        <h3>Chatting with <span id="chatWith"></span> <button onclick="location.reload()" style="padding: 5px 10px; background: #6c757d; float: right;">Disconnect</button></h3>
        <div class="chat-container" id="messages"></div>
        <div class="controls">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()"/>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let myId = "";
        let receiverId = "";

        async function connect() {
            myId = document.getElementById("myId").value.trim();
            receiverId = document.getElementById("receiverId").value.trim();

            if (!myId || !receiverId) {
                alert("Please enter both IDs");
                return;
            }

            document.getElementById("setup").style.display = "none";
            document.getElementById("chatInterface").style.display = "block";
            document.getElementById("chatWith").innerText = receiverId;

            await loadMessages();

            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/${myId}`);

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === "message" && (data.sender_id === receiverId || data.sender_id === myId)) {
                    appendMessage(data.sender_id, data.content, data.timestamp);
                }
            };
            
            ws.onclose = function(event) {
                console.log("WebSocket disconnected:", event);
                alert("Connection lost. Please refresh or reconnect.");
                document.getElementById("setup").style.display = "block";
                document.getElementById("chatInterface").style.display = "none";
            };

            ws.onerror = function(err) {
                console.error("WebSocket error:", err);
            };
        }

        async function loadMessages() {
            try {
                const res = await fetch(`/messages/${myId}/${receiverId}`);
                if (res.ok) {
                    const messages = await res.json();
                    const container = document.getElementById("messages");
                    container.innerHTML = "";
                    messages.forEach(msg => {
                        appendMessage(msg.sender_id, msg.content, msg.timestamp);
                    });
                }
            } catch (err) {
                console.error("Failed to load messages:", err);
            }
        }

        function appendMessage(sender, content, timestamp) {
            const container = document.getElementById("messages");
            
            // Check if message already exists (to avoid duplicates)
            const isMe = sender === myId;
            const lastMsg = container.lastElementChild;
            if (isMe && lastMsg && lastMsg.innerText.includes(content) && !timestamp) {
                // If it's a local optimistic update, we might want to skip or update it
                // For simplicity, we'll just let the server-broadcasted one handle it
            }

            const div = document.createElement("div");
            div.className = "message";
            
            let timeStr = "";
            if (timestamp) {
                const date = new Date(timestamp);
                timeStr = ` <span style="font-size: 0.8em; color: #888;">${date.toLocaleTimeString()}</span>`;
            }
            div.innerHTML = `<span class="sender ${isMe ? 'me' : ''}">${isMe ? 'Me' : sender}:</span> ${content}${timeStr}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (content && ws) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ receiver: receiverId, content: content }));
                    input.value = "";
                } else {
                    alert("Not connected to server. Please reconnect.");
                }
            }
        }
    </script>
</body>
</html>
